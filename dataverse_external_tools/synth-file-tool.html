<html>
<head>
    <title>Synthetic Replicant File Tool</title>
</head>
<body>
    <h1>Synthetic Replicant File Tool (Experimental Fake implementation!)</h1>
    <p>This tool generates a synthetic representation of a file. </p>

    <div id="tool-info">
        <!-- This is where the tool's information will be displayed -->
    </div>
<script>

    // Example of how to call an external tool with parameters, NOT functional
    function callSynthFileTool(fileContent) {
        const params = {
            // Add necessary parameters here
        };

        fetch('https://some-synth-api/', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(params)
        })
        .then(response => response.text())
        .then(data => {
            console.log('Tool Output:', data);
        })
        .catch(error => {
            console.error('Error calling Synth File Tool:', error);
        });
    }

    //--- Display functions, adding elements to the tool-info div for demonstration purposes ---

    function displayQueryParams(queryParams) {
        const outputDiv = document.getElementById('tool-info');
        const queryParamsResults = document.createElement('p');
        queryParamsResults.textContent = 'Tool Input:';
        outputDiv.appendChild(queryParamsResults);
        const queryList = document.createElement('ul');
        outputDiv.appendChild(queryList);
        // iterate over all query parameters and display them
        for (const [key, value] of Object.entries(queryParams)) {
            const li = document.createElement('li');
            li.textContent = `${key}: ${value}`;
            queryList.appendChild(li);
        }
    }

    // slightly different from displayQueryParams... object stuff
    function displayUrlParams(urlParams) {
        // iterate over all query parameters and show them
        const outputDiv = document.getElementById('tool-info');
        const queryParamsResults = document.createElement('p');
        queryParamsResults.textContent = 'Tool url params:';
        outputDiv.appendChild(queryParamsResults);
        const queryList = document.createElement('ul');
        outputDiv.appendChild(queryList);
        // iterate over all query parameters and display them
        urlParams.forEach((value, key) => {
            const li = document.createElement('li');
            li.textContent = `${key}: ${value}`;
            queryList.appendChild(li);
        });
    }

    function displayFileContent(fileContent) {
        const outputDiv = document.getElementById('tool-info');
        const fileContentDiv = document.createElement('div');
        fileContentDiv.textContent = 'File Content (first 10 lines):';
        outputDiv.appendChild(fileContentDiv);
        const fileLines = fileContent.split('\n').slice(0, 10);
        const fileLinesList = document.createElement('ul');
        fileLines.forEach(line => {
            const li = document.createElement('li');
            li.textContent = line;
            fileLinesList.appendChild(li);
        });
        outputDiv.appendChild(fileLinesList);
    }

    function displayAuxFileContent(fileContent) {
        const outputDiv = document.getElementById('tool-info');
        const fileContentDiv = document.createElement('div');
        fileContentDiv.id = 'aux-file-content';
        fileContentDiv.textContent = 'Auxiliary File Content (first 10 lines):';
        outputDiv.appendChild(fileContentDiv);
        const fileLines = fileContent.split('\n').slice(0, 10);
        const fileLinesList = document.createElement('ul');
        fileLines.forEach(line => {
            const li = document.createElement('li');
            li.textContent = line;
            fileLinesList.appendChild(li);
        });
        fileContentDiv.appendChild(fileLinesList);
    }

    function displayDeleteAuxFileButton(queryParams) {
        const outputDiv = document.getElementById('tool-info');
        const deleteButton = document.createElement('button');
        deleteButton.id = 'delete-aux-file-btn';
        deleteButton.textContent = 'Delete Auxiliary File';
        deleteButton.onclick = function() {
            // This function would contain the logic to delete the auxiliary file
            // using the query parameters.
            console.log('Deleting auxiliary file with parameters:', queryParams);
            
            fetch(queryParams.auxFileDeleteUrl, {
                method: 'DELETE',
                // headers: {
                //     'Content-Type': 'application/json'
                // },
                // body: JSON.stringify({ /* necessary parameters for deletion */ })
            })
            .then(response => response.text())
            .then(data => {
                console.log('Auxiliary file deleted:', data);
                // Optionally, you could also remove the displayed content or update the UI accordingly
                // delete related stuff
                const deleteButton = document.getElementById('delete-aux-file-btn');
                if (deleteButton) {
                    deleteButton.remove();
                }
                const auxFileContentDiv = document.getElementById('aux-file-content');
                if (auxFileContentDiv) {
                    // remove the div and everything inside it
                    //auxFileContentDiv.innerHTML = '';
                    auxFileContentDiv.remove();
                }
            })
            .catch(error => {
                console.error('Error deleting auxiliary file:', error);
            });
        };
        outputDiv.appendChild(deleteButton);
    }

    //--- Retrieval and Storing functions ---

    function createAuxFile(queryParams) { 

        const auxFileJson = {
            synthetic: "This is a synthetic auxiliary file content based on the original file content. It can be used for testing purposes.",
            timestamp: new Date().toISOString(),
        };
        const auxFileContent = new Blob([JSON.stringify(auxFileJson, null, 2)], { type: 'application/json' });

        const formData = new FormData();
        formData.append('file', auxFileContent, 'synthetic_aux_file.json');
        formData.append('origin', 'synth');
        formData.append('isPublic', 'true');
        formData.append('type', 'synth');//'synthJson');

        console.log('Uploading auxiliary file to:', queryParams.auxFileUploadUrl);
        fetch(queryParams.auxFileUploadUrl, {
            method: 'POST',
            // headers: {
            //     'X-Dataverse-Key': queryParams.apiToken
            // },
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            console.log('Auxiliary file upload response:', data);
            // ad a bit of info
            const outputDiv = document.getElementById('tool-info');
            const fileContentDiv = document.createElement('div');
            fileContentDiv.textContent = 'Auxiliary File created!';
            outputDiv.appendChild(fileContentDiv);
        })
        .catch(error => {
            console.error('Error uploading auxiliary file:', error);
            // Note that a 409 Conflict error is expected if the auxiliary file already exists
        });
    }

    function processContent(queryParams, fileContent) {
        // This function would contain the logic to upload an auxiliary file
        // using the query parameters and the file content.
        console.log('Processing file with parameters:', queryParams);

        // Maybe we have  an apiKey, but I could not get this working
        console.log('token:', queryParams.apiToken);

        // first list the aux files
        fetch(queryParams.auxFilesListUrl, {
            method: 'GET'
        })
        .then(response => response.json())
        .then(list_data => {
            console.log('Auxiliary files list response:', list_data);       

            // try to retrieve the aux file content if it exists
            if (list_data.data && list_data.data.length > 0) {
                console.log('Auxiliary file already exists, retrieving contents...');
                fetch(queryParams.auxFileContentsUrl, {
                    method: 'GET'
                })
                .then(response => response.text())
                .then(aux_file_content => {
                    console.log('Auxiliary file content:', aux_file_content);
                    displayAuxFileContent(aux_file_content);
                    displayDeleteAuxFileButton(queryParams);
                })
                .catch(error => {
                    console.error('Error retrieving auxiliary file content:', error);
                });
            } else {
                console.log('No auxiliary file exists, but there was no 404 error?');
                console.log('However, starting the create...');
                createAuxFile(queryParams);
            }
        })
        .catch(error => {
            // Not Found is expected when there is no aux file yet
            // handle it gracefully and continue with the upload
            if (error.status === 404) {
                console.warn('No auxiliary files found, should create one.');
                console.log('Starting the create...');
                createAuxFile(queryParams);
            } else {
                // For other errors, we might want to stop the process or handle it differently
                console.error('Unexpected error listing auxiliary files, stopping process: ', error);
                return;
            }
        })
        .finally(() => {
            console.log('Finished processContent.');
        });
    }  

    // This function contains the logic to continue the process
    // using the query parameters.
    function continueWithParams(queryParams) {
        console.log('Continuing with parameters:', queryParams);

        displayQueryParams(queryParams);

        // download up to 10 lines of the file
        // queryParams.fileUrl should contain the signed URL to retrieve the file contents
        if (queryParams.fileUrl) {
            console.log('Retrieving file content from:', queryParams.fileUrl);
            fetch(queryParams.fileUrl)
                .then(response => response.text())
                .then(fileContent => {
                    // Note that we have the whole file content already...
                    displayFileContent(fileContent);
                    // there is no waiting... just displaying is not a real problem, it does not change
                    // we can try start processing immediately for now
                    processContent(queryParams, fileContent);
                })
                .catch(error => {
                    console.error('Error retrieving file content:', error);
                });

        } else {
            console.warn('No fileUrl provided in query parameters, cannot retrieve file content.');
        }
    }

    // handle onload; get or extract the query parameters
    window.onload = function() {
        var queryParams = {};

        // get the query parameters from the URL
        var urlParams = new URLSearchParams(window.location.search);
        
        displayUrlParams(urlParams);

        var locale = urlParams.get('locale');
        if (locale == null) {
            locale = 'en';
        }

        // From the guide: For tools invoked via a GET call, 
        // Dataverse will include a callback query parameter with a Base64 encoded value. 
        // The decoded value is a signed URL that can be called to retrieve a JSON response 
        // containing all of the queryParameters and allowedApiCalls specified 
        // in the manifest.
        if (urlParams.has("callback")) {
            var callback = atob(urlParams.get("callback"));
            console.log('Decoded callback URL:', callback);

            fetch(callback, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                },
            })
            .then(response => response.json())
            .then(json => {
                console.log('Callback Response:', json.data);

                queryParams = json.data.queryParameters;
                var urls = json.data.signedUrls;
                for (var i in urls) {
                    var url = urls[i];
                    switch (url.name) {
                        case 'retrieveFileContents':
                            queryParams.fileUrl = url.signedUrl;
                            break;
                        case 'downloadFile':
                            queryParams.fileDownloadUrl = url.signedUrl;
                            break;
                        case 'getDatasetVersionMetadata':
                            queryParams.versionUrl = url.signedUrl;
                            break;
                        case 'retrieveDataFile': // Only got this one configured!
                            queryParams.fileUrl = url.signedUrl;
                            break;
                        case 'listAuxFiles':
                            queryParams.auxFilesListUrl = url.signedUrl;
                            break;
                        case 'retrieveAuxFileContents':
                            queryParams.auxFileContentsUrl = url.signedUrl;
                            break;
                        case 'deleteAuxFile':
                            queryParams.auxFileDeleteUrl = url.signedUrl;
                            break;
                        case 'uploadAuxFile':
                            queryParams.auxFileUploadUrl = url.signedUrl;
                            break;
                        default:
                    }
                }
                continueWithParams(queryParams);
            })
            .catch(error => {
                console.error('Error calling callback:', error);
            });
        } else {
            // No callback, I guess this is the case for old versions of Dataverse
            // probably I do not want or need to support this, 
            // but copied it from the previewers retriever.js.
            console.log('No callback provided, nothing to do');

            // could try to extract the parameters from the URL directly
            // urlParams.forEach((value, key) => {
            //     queryParams[key] = value;
            // });
            // var fileUrl = queryParams.siteUrl + "/api/access/datafile/"
            //     + queryParams.fileid + "?gbrecs=true";
            // var fileDownloadUrl = queryParams.siteUrl + "/api/access/datafile/"
            //     + queryParams.fileid + "?gbrecs=false";
            // var versionUrl = queryParams.siteUrl + "/api/datasets/"
            //     + queryParams.datasetid + "/versions/"
            //     + queryParams.datasetversion;
            // var apiKey = queryParams.key;
            // if (apiKey != null) {
            //     fileUrl = fileUrl + "&key=" + apiKey;
            //     fileDownloadUrl = fileUrl + "&key=" + apiKey;
            //     versionUrl = versionUrl + "?key=" + apiKey;
            // }
            // queryParams.fileUrl = fileUrl;
            // queryParams.fileDownloadUrl = fileDownloadUrl;
            // queryParams.versionUrl = versionUrl;
            // continueWithParams(queryParams);
        }

        // nothing to do here, the rest of the logic is in the continueWithParams function, 
        // which is called after we have the query parameters ready.
    };

</script>
</body>
</html>
